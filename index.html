<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container-fluid">
    <header class="row text-center">
        <h1 class="mb-5">Cadastro de Jogo Preferido</h1>
    </header>

    <main class="container">
        <form action="#" method="post" novalidate>
            
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title">Cadastro do Usuário</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome:</label>
                        <input type="text" id="nome" class="form-control" required>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" class="form-control" required>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>

                    <div class="mb-3">
                        <label for="nick" class="form-label">Nick nos Jogos:</label>
                        <input type="text" id="nick" class="form-control" required>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>
                </div>
            </div>

            
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title">Cadastro do Jogo Preferido</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="nome-jogo" class="form-label">Nome do Jogo:</label>
                        <input type="text" id="nome-jogo" class="form-control" required>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>

                    <div class="mb-3">
                        <label for="genero" class="form-label">Gênero:</label>
                        <select class="form-select" id="genero" required>
                            <option selected disabled>Selecione um gênero</option>
                            <option value="acao">Ação</option>
                            <option value="rpg">RPG</option>
                            <option value="estrategia">Estratégia</option>
                            <option value="simulacao">Simulação</option>
                            <option value="esporte">Esporte</option>
                            <option value="corrida">Corrida</option>
                            <option value="outro">Outro</option>
                        </select>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Plataformas:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="pc" value="pc">
                            <label class="form-check-label" for="pc">PC</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="ps5" value="ps5">
                            <label class="form-check-label" for="ps5">PlayStation 5</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="xbox" value="xbox">
                            <label class="form-check-label" for="xbox">Xbox Series X/S</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="nintendo" value="nintendo">
                            <label class="form-check-label" for="nintendo">Nintendo Switch</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="mobile" value="mobile">
                            <label class="form-check-label" for="mobile">Mobile</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="avaliacao" class="form-label">Avaliação (1-10):</label>
                        <input type="range" class="form-range" id="avaliacao" min="1" max="10" value="5" oninput="document.getElementById('avaliacao-valor').textContent = this.value;">
                        <output id="avaliacao-valor">5</output>/10
                    </div>

                    <div class="mb-3">
                        <label for="ano-lancamento" class="form-label">Ano de Lançamento:</label>
                        <input type="number" id="ano-lancamento" class="form-control" min="1950" max="2030" required>
                        <div class="invalid-feedback" style="display: none;"></div>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição (Por que você gosta?):</label>
                        <textarea class="form-control" id="descricao" rows="4" placeholder="Conte um pouco sobre o jogo..."></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Cadastrar Jogo Preferido</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>

</html>
